<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="TabVM">
  <title>TabVM favicon — adapts to light/dark</title>
  <!-- Theme-adaptive: follows the browser/OS color scheme automatically. -->
  <style>
    :root { --mark: #0E1116; --accent: #0E9E8E; }
    @media (prefers-color-scheme: dark) { :root { --mark: #E6EDF3; --accent: #2FE3CE; } }
  </style>
  <rect x="8" y="20" width="48" height="36" rx="8" fill="none" stroke="var(--mark)" stroke-width="4"/>
  <rect x="14" y="8" width="23" height="18" rx="5" fill="var(--accent)"/>
  <path d="M19 38 l6.5 4.4 -6.5 4.4" fill="none" stroke="var(--mark)" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="31" y="44.6" width="14" height="3.6" rx="1.8" fill="var(--accent)"/>
</svg>
