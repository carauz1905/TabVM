name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    # TabVM's agent uses Windows-only APIs (COM screen capture, Windows syscalls),
    # so the Go build/test must run on Windows — its target platform. Building on
    # Linux fails with "undefined: syscall.NewLazyDLL" and similar.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: "1.26"
          cache-dependency-path: apps/desktop-agent/go.sum

      - name: Install dependencies
        run: npm ci

      - name: Type-check web UI
        run: npm run webui:typecheck

      - name: Build (web UI + embedded agent)
        run: npm run build

      - name: Test
        run: npm test

      - name: Go vet
        working-directory: apps/desktop-agent
        # -unsafeptr=false: the Windows COM/syscall interop (vmscreen, hostpick)
        # legitimately converts unsafe.Pointer for vtable and syscall calls; the
        # unsafeptr analyzer over-flags it. All other vet checks stay enabled.
        run: go vet -unsafeptr=false ./...
