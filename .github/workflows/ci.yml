name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: apps/desktop-agent/go.sum

      - name: Install dependencies
        run: npm ci

      - name: Type-check web UI
        run: npm run webui:typecheck

      - name: Build (web UI + embedded agent)
        run: npm run build

      - name: Test
        run: npm test

      - name: Go vet
        working-directory: apps/desktop-agent
        run: go vet ./...
